stages:
  - setup
  - lint
  - security
  - test
  - quality

variables:
  PYTHONPATH: "$CI_PROJECT_DIR"

setup:
  stage: setup
  script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install flake8 bandit pip-audit pytest pytest-cov pylint pyupgrade vulture semgrep

lint:
  stage: lint
  script:
    - flake8 backend

dependency_audit:
  stage: security
  script:
    - pip-audit

security_bandit:
  stage: security
  script:
    - bandit -r backend

semgrep:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config=auto

test:
  stage: test
  script:
    - cd backend
    - pytest --cov=. --cov-report=term --cov-report=xml

pylint:
  stage: quality
  script:
    - pylint backend

pyupgrade:
  stage: quality
  script:
    - pyupgrade $(find backend -name "*.py")

vulture:
  stage: quality
  script:
    - vulture backend