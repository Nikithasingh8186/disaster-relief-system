stages:
  - setup
  - lint
  - security
  - test
  - quality

setup:
  stage: setup
  script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt || true
    - pip install flake8 bandit pip-audit pytest pytest-cov pylint pyupgrade vulture semgrep

lint:
  stage: lint
  script:
    - flake8 backend || true

dependency_audit:
  stage: security
  script:
    - pip-audit || true

security_bandit:
  stage: security
  script:
    - bandit -r backend || true

semgrep:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config=auto || true

test:
  stage: test
  script:
    - pytest --cov=backend --cov-report=term --cov-report=xml || true

pylint:
  stage: quality
  script:
    - pylint backend || true

pyupgrade:
  stage: quality
  script:
    - pyupgrade $(find backend -name "*.py") || true

vulture:
  stage: quality
  script:
    - vulture backend || true