image: python:3.10

stages:
  - setup
  - lint
  - security
  - test
  - quality

variables:
  PYTHONPATH: "$CI_PROJECT_DIR"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# -----------------------------
# CACHE (speed boost)
# -----------------------------
cache:
  paths:
    - .cache/pip

# -----------------------------
# INSTALL DEPENDENCIES ONCE
# -----------------------------
setup:
  stage: setup
  script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install flake8 pytest pytest-cov bandit pip-audit pylint pyupgrade vulture

# -----------------------------
# LINT
# -----------------------------
lint:
  stage: lint
  script:
    - flake8 backend

# -----------------------------
# SECURITY: DEPENDENCY AUDIT
# -----------------------------
dependency_audit:
  stage: security
  script:
    - pip-audit

# -----------------------------
# SECURITY: BANDIT
# -----------------------------
security_bandit:
  stage: security
  script:
    - bandit -r backend

# -----------------------------
# SEMGREP (STATIC ANALYSIS)
# -----------------------------
semgrep:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config=auto

# -----------------------------
# TESTS + COVERAGE
# -----------------------------
test:
  stage: test
  script:
    - pytest --cov=backend --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/TOTAL.*\s+(\d+\%)$/'

# -----------------------------
# QUALITY CHECKS
# -----------------------------
pylint:
  stage: quality
  script:
    - pylint backend || true

pyupgrade:
  stage: quality
  script:
    - pyupgrade $(find backend -name "*.py") || true

vulture:
  stage: quality
  script:
    - vulture backend || true