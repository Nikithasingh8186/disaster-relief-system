stages:
  - lint
  - format
  - type_check
  - test
  - coverage

image: python:3.10

before_script:
  - pip install -r requirements.txt
  - pip install pytest pytest-cov black isort mypy flake8

# ---------------- LINT ----------------
lint:
  stage: lint
  script:
    - flake8 backend

# ---------------- FORMAT ----------------
format:
  stage: format
  script:
    - black --check .
    - isort --check-only .

# ---------------- TYPE CHECK ----------------
type_check:
  stage: type_check
  script:
    - mypy backend || true

# ---------------- TEST ----------------
test:
  stage: test
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    - pytest -q

# ---------------- COVERAGE ----------------
coverage:
  stage: coverage
  script:
    - pip install pytest-cov
    - pytest --cov=backend --cov-report=term