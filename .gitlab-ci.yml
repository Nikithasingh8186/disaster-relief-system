stages:
  - lint
  - test
  - security

black:
  stage: lint
  script:
    - pip install black
    - black --check .

flake8:
  stage: lint
  script:
    - pip install flake8
    - flake8 .

isort:
  stage: lint
  script:
    - pip install isort
    - isort --check-only .

mypy:
  stage: lint
  script:
    - pip install mypy
    - mypy backend

pytest:
  stage: test
  script:
    - pip install pytest
    - pytest tests

bandit:
  stage: security
  script:
    - pip install bandit
    - bandit -r backend