stages:
  - lint
  - security
  - test
  - quality

image: python:3.10

before_script:
  - pip install -r requirements.txt
  - pip install pytest pytest-cov bandit pylint pip-audit pyupgrade

# ---------------- LINT ----------------
lint:
  stage: lint
  script:
    - flake8 backend
    - black --check .
    - isort --check-only .

# ---------------- SECURITY ----------------
security_bandit:
  stage: security
  script:
    - bandit -r backend

dependency_audit:
  stage: security
  script:
    - pip-audit

semgrep:
  stage: security
  image: returntocorp/semgrep
  script:
    - semgrep --config=auto

# ---------------- TEST ----------------
test:
  stage: test
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    - pytest --cov=backend --cov-report=term

# ---------------- QUALITY ----------------
pylint:
  stage: quality
  script:
    - pylint backend || true

pyupgrade:
  stage: quality
  script:
    - pyupgrade $(git ls-files '*.py')