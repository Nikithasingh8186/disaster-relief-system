image: python:3.10

stages:
  - lint
  - security
  - test
  - quality

variables:
  PYTHONPATH: "$CI_PROJECT_DIR"

# -----------------------------
# BASE INSTALL (used by most jobs)
# -----------------------------
.base_install: &base_install
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install flake8 pytest pytest-cov bandit pip-audit pylint pyupgrade vulture

# -----------------------------
# LINT
# -----------------------------
lint:
  stage: lint
  <<: *base_install
  script:
    - flake8 backend

# -----------------------------
# DEPENDENCY AUDIT
# -----------------------------
dependency_audit:
  stage: security
  <<: *base_install
  script:
    - pip-audit

# -----------------------------
# BANDIT
# -----------------------------
security_bandit:
  stage: security
  <<: *base_install
  script:
    - bandit -r backend

# -----------------------------
# SEMGREP (separate image)
# -----------------------------
semgrep:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config=auto

# -----------------------------
# TEST + COVERAGE
# -----------------------------
test:
  stage: test
  <<: *base_install
  script:
    - pytest --cov=backend --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/TOTAL.*\s+(\d+\%)$/'

# -----------------------------
# PYLINT
# -----------------------------
pylint:
  stage: quality
  <<: *base_install
  script:
    - pylint backend || true

# -----------------------------
# PYUPGRADE
# -----------------------------
pyupgrade:
  stage: quality
  <<: *base_install
  script:
    - pyupgrade $(find backend -name "*.py") || true

# -----------------------------
# VULTURE (FIXED)
# -----------------------------
vulture:
  stage: quality
  <<: *base_install
  script:
    - vulture backend || true